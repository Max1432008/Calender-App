<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="color.css" />
    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 id="Hallo">Hallo</h1>
    <nav class="nav">
      <button>
        <img src="/img/calender.svg" alt="" />
      </button>
      <button>
        <img src="/img/Plus.svg" alt="" />
      </button>
      <button><img src="/img/search.svg" alt="" /></button>
    </nav>

    <div class="grid-container" id="grid-container"></div>

    <template id="calender-day">
      <div class="container-calender">
        <h2 class="date-headline">date</h2>
        <div class="content"></div>
      </div>
    </template>

    <template id="Event">
      <button class="event">
        <div class="event-color"></div>
        <span class="event-content"></span>
      </button>
    </template>

    <script src="script.js"></script>
  </body>
</html>
